<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="styles.css">
    <style>
    @property --_depth { syntax: "<number>"; inherits: true; initial-value: 0; }

    .surface {
      --_depth: calc(var(--_depth) + 1);
      --bg: var(--_depth);
      padding: 1.5rem;
    }
      .surface                             { --bg: 1; }
      .surface .surface                    { --bg: 2; }
      .surface .surface .surface           { --bg: 3; }
      .surface .surface .surface .surface  { --_bg: 4; background:var(--_bg)) }

    }
  </style>
</head>
<body style="--color:blue">
  <div class="surface">Level 1
    <div class="surface">Level 2
      <div class="surface">Level 3
        <div class="surface">Level 4
          <div class="surface">Level 5
            <div class="surface">Level 6</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
