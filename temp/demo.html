<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color & Type — Component Demo</title>
<script type="module" src="https://cdn.jsdelivr.net/gh/starfederation/datastar@1.0.0-RC.8/bundles/datastar.js"></script>

<!-- ── Datastar signal → CSS bridge ── -->
<style data-text="':root { --hue: ' + $hue + '; --cfg-surf-chroma: ' + $surfChroma + '; --cfg-color-chroma: ' + $colorChroma + '; --color-mode: ' + $mode + '; }'"
       data-init="$hue = 250; $surfChroma = 0.02; $colorChroma = 0.15; $mode = 0"></style>

<!-- ── Mode hue offsets (Datastar-driven) ── -->
<style data-text="'.panel { --hue-sec: calc(var(--hue) + ' + ($mode===1?180:$mode===2?120:$mode===3?30:0) + '); --hue-ter: calc(var(--hue) + ' + ($mode===1?180:$mode===2?240:$mode===3?-30:0) + '); }'"></style>

<style>

/* ══════════════════════════════════════════════════════════════════════
   @property registrations
══════════════════════════════════════════════════════════════════════ */
@property --hue              { syntax: "<number>";  inherits: true;  initial-value: 250; }
@property --cfg-surf-chroma  { syntax: "<number>";  inherits: true;  initial-value: 0.02; }
@property --cfg-color-chroma { syntax: "<number>";  inherits: true;  initial-value: 0.15; }
@property --color-mode       { syntax: "<integer>"; inherits: true;  initial-value: 0; }
@property --surface          { syntax: "<number>";  inherits: true;  initial-value: 0; }
@property --contrast         { syntax: "<number>";  inherits: true;  initial-value: 1; }
@property --cfg-dark         { syntax: "<number>";  inherits: true;  initial-value: 0; }
@property --_bg              { syntax: "<color>";   inherits: true;  initial-value: oklch(87% 0.02 250); }
@property --_depth-a         { syntax: "<integer>"; inherits: true;  initial-value: 0; }
@property --_depth-b         { syntax: "<integer>"; inherits: true;  initial-value: 0; }
@property --_parity          { syntax: "<integer>"; inherits: true;  initial-value: 0; }
@property --_hue-pri         { syntax: "<number>";  inherits: true;  initial-value: 250; }
@property --_c-surf          { syntax: "<number>";  inherits: true;  initial-value: 0.02; }
@property --_c-color         { syntax: "<number>";  inherits: true;  initial-value: 0.15; }
@property --color-index      { syntax: "<integer>"; inherits: true;  initial-value: 0; }

@layer core.config, core.color, core.palette, component, page;

/* ══════════════════════════════════════════════════════════════════════
   LAYER: core.config
══════════════════════════════════════════════════════════════════════ */
@layer core.config {
  .panel {
    --cfg-dark: 0;
    --_surf-base: calc(87% - var(--cfg-dark) * 75%);
    --_surf-step: 2.5%;
    --cfg-radius: 6px;
  }
  .panel.dark { --cfg-dark: 0.85; }
}

/* ══════════════════════════════════════════════════════════════════════
   LAYER: core.color
══════════════════════════════════════════════════════════════════════ */
@layer core.color {
  :where(.panel) {
    --_c-surf:  clamp(0, var(--cfg-surf-chroma), 0.06);
    --_c-color: clamp(0.04, var(--cfg-color-chroma), 0.37);
  }

  :where(*) {
    --_bg: oklch(
      clamp(10%, calc(var(--_surf-base) + var(--surface) * var(--_surf-step)), 99%)
      var(--_c-surf)
      var(--hue)
    );
    --_border: oklch(from var(--_bg) calc(l - 0.09 + var(--cfg-dark) * 0.20) c h);
    background: var(--_bg);
    color: oklch(from var(--_bg)
      calc(l + (clamp(0, calc((0.5 - l) * 999), 1) - l) * var(--contrast))
      calc(c * (1 - var(--contrast)))
      h
    );
  }

  @container style(--_parity: 0) {
    .surface { --_depth-b: calc(var(--_depth-a) + 1); --surface: var(--_depth-b); --_parity: 1; }
  }
  @container style(--_parity: 1) {
    .surface { --_depth-a: calc(var(--_depth-b) + 1); --surface: var(--_depth-a); --_parity: 0; }
  }
}

/* ══════════════════════════════════════════════════════════════════════
   LAYER: core.palette
══════════════════════════════════════════════════════════════════════ */
@layer core.palette {
  :where(.panel) {
    --_hue-pri: var(--hue);
    --hue-sec: calc(var(--hue) + 180);
    --hue-ter: calc(var(--hue) + 180);
    --_color-mid-l: calc(75% - var(--cfg-dark) * 10%);
    --_color-l-step: 12%;
  }

  :where(*) {
    --_color-l: clamp(20%, calc(var(--_color-mid-l) + var(--color-index) * var(--_color-l-step)), 90%);
    --color-pri: oklch(var(--_color-l) var(--_c-color) var(--_hue-pri));
    --color-sec: oklch(var(--_color-l) var(--_c-color) var(--hue-sec));
    --color-ter: oklch(var(--_color-l) var(--_c-color) var(--hue-ter));
  }

  :where(.pri) { --_bg: var(--color-pri); }
  :where(.sec) { --_bg: var(--color-sec); }
  :where(.ter) { --_bg: var(--color-ter); }
}

/* ══════════════════════════════════════════════════════════════════════
   LAYER: component — buttons + toggle group
   ─────────────────────────────────────────────────────────────────
   Buttons use .pri/.sec/.ter for palette color, --color-index for
   hover/active states. Toggle group uses surface colors by default,
   overrides --_bg to palette color on [aria-pressed="true"].
══════════════════════════════════════════════════════════════════════ */
@layer component {

  /* ── base button ── */
  :where(button, .btn) {
    border: 1px solid var(--_border);
    border-radius: var(--cfg-radius);
    padding: 0.5em 1.25em;
    cursor: pointer;
    font: inherit;
  }

  /* palette buttons: hover brightens, active darkens */
  :where(.pri, .sec, .ter):where(button, .btn) {
    &:hover  { --color-index: 2; }
    &:active { --color-index: -2; }
  }

  /* ghost button: surface-colored, subtle */
  :where(button.ghost, .btn.ghost) {
    --contrast: 0.5;
    background: transparent;
    &:hover  { --contrast: 0.75; --surface: 2; background: var(--_bg); }
    &:active { --contrast: 1;    --surface: -2; }
  }

  /* ── toggle group ── */
  :where(.toggle-group) { display: inline-flex;

    button { --contrast: 0.5;

      &:has(+ button) {
        border-start-end-radius: 0;
        border-end-end-radius: 0;
      }
      & + button {
        border-start-start-radius: 0;
        border-end-start-radius: 0;
        border-inline-start: 1px solid var(--_border);
      }

      &:hover { --contrast: 0.75; }

      &[aria-pressed="true"] {
        --_bg: var(--color-pri);
        --contrast: 1;
      }
      &[aria-pressed="true"] + button,
      & + button[aria-pressed="true"] {
        border-inline-start-color: transparent;
      }
    }
  }
}

/* ══════════════════════════════════════════════════════════════════════
   LAYER: page
══════════════════════════════════════════════════════════════════════ */
@layer page {
  *, *::before, *::after { box-sizing: border-box; margin: 0; }

  :root {
    font-family: Optima, Candara, 'Noto Sans', sans-serif;
    font-size: 15px;
    --cfg-page-gap: 0px;
    --mono: 'SF Mono', Menlo, monospace;
    --label: 10px;
  }

  body {
    position: fixed;
    inset: 0;
    overflow: hidden;
    overscroll-behavior: none;
    display: grid;
    grid-template:
      "header"  auto
      "main"    1fr
      / 1fr;
    height: 100svh;
  }

  #header { grid-area: header; }
  #main   { grid-area: main; overflow-y: auto; scrollbar-gutter: stable;
             display: grid; grid-template-columns: 1fr 1fr; }
}
</style>

<!-- ── Scoped CSS runtime ── -->
<script>
window.cssScopeCount ??= 1
window.cssScope ??= new MutationObserver(mutations => {
  document?.body?.querySelectorAll('style:not([ready])').forEach(node => {
    var scope = 'me__'+(window.cssScopeCount++)
    node.parentNode.classList.add(scope)
    node.textContent = node.textContent
      .replace(/(?:^|\.|(\s|[^a-zA-Z0-9\-\_]))(me|this|self)(?![a-zA-Z\/])/g, '$1.'+scope)
      .replace(/((@keyframes|animation:|animation-name:)[^{};]*)\.me__/g, '$1me__')
    node.setAttribute('ready', '')
  })
}).observe(document.documentElement, {childList: true, subtree: true})
</script>
</head>
<body>

<!-- ══ HEADER ═══════════════════════════════════════════════════════ -->
<header id="header">
  <style>
    me {
      display: flex; align-items: center; gap: 1.5rem;
      padding: 0.75rem 1.5rem;
      background: #111; color: #aaa;
      font-family: var(--mono); font-size: 11px;
      flex-wrap: wrap;
    }
    me > label { display: flex; align-items: center; gap: 0.5rem; }
    me input[type=range] { width: 120px; accent-color: #888; }
    me > span { color: #fff; min-width: 2.5rem; display: inline-block; }
    me > button {
      padding: 2px 8px; border-radius: 3px;
      border: 1px solid #444; background: transparent;
      color: #888; cursor: pointer;
      font-family: inherit; font-size: 11px;
      transition: background 0.15s;
    }
    me > button.active { background: #444; color: #fff; border-color: #666; }
    me > hr { border: none; border-left: 1px solid #444; height: 1em; }
  </style>

  <a href="/">Home</a>

  <label>
    hue
    <input type="range" min="0" max="360" step="1" data-bind:hue>
    <span data-text="$hue"></span>
  </label>

  <hr>

  <label>
    surf C
    <input type="range" min="0" max="0.06" step="0.005" data-bind:surfChroma>
    <span data-text="$surfChroma"></span>
  </label>

  <label>
    color C
    <input type="range" min="0.04" max="0.37" step="0.01" data-bind:colorChroma>
    <span data-text="$colorChroma"></span>
  </label>

  <hr>

  <label>mode</label>
  <button data-class="{active: $mode===0}" data-on:click="$mode=0">mono</button>
  <button data-class="{active: $mode===1}" data-on:click="$mode=1">complement</button>
  <button data-class="{active: $mode===2}" data-on:click="$mode=2">triad</button>
  <button data-class="{active: $mode===3}" data-on:click="$mode=3">analogous</button>
</header>

<!-- ══ MAIN ═════════════════════════════════════════════════════════ -->
<div id="main">

  <!-- ── LIGHT ── -->
  <div class="panel">
    <style>
      me {
        padding: 2rem; container-type: style;
        display: flex; flex-direction: column; gap: 2.5rem;
      }
      me > h2 {
        font-size: var(--label); text-transform: uppercase;
        letter-spacing: 0.1em; opacity: 0.4;
        font-family: var(--mono); font-weight: normal;
      }
      me > section { display: flex; flex-direction: column; gap: 1rem; }
      me > section > h3 {
        font-size: var(--label); text-transform: uppercase;
        letter-spacing: 0.08em; opacity: 0.35;
        font-family: var(--mono); font-weight: normal;
      }
      me > section > div { display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; }
      me > hr { border: none; border-top: 1px solid var(--_border); opacity: 0.25; }
    </style>

    <h2>Light mode</h2>

    <section>
      <h3>Palette buttons — .pri / .sec / .ter</h3>
      <div>
        <button class="pri">Primary</button>
        <button class="sec">Secondary</button>
        <button class="ter">Tertiary</button>
      </div>
    </section>

    <section>
      <h3>Ghost button — surface-colored</h3>
      <div>
        <button class="ghost">Ghost</button>
        <button class="ghost">Cancel</button>
      </div>
    </section>

    <hr>

    <section>
      <h3>Toggle group — surface default, .pri on pressed</h3>
      <div>
        <div class="toggle-group" data-signals:lightMode="'mono'">
          <button data-attr:aria-pressed="String($lightMode==='mono')"       data-on:pointerdown="$lightMode='mono'">Mono</button>
          <button data-attr:aria-pressed="String($lightMode==='complement')" data-on:pointerdown="$lightMode='complement'">Complement</button>
          <button data-attr:aria-pressed="String($lightMode==='triad')"      data-on:pointerdown="$lightMode='triad'">Triad</button>
        </div>
      </div>
    </section>

    <hr>

    <section>
      <h3>Mixed — palette + ghost side by side</h3>
      <div>
        <button class="pri">Save</button>
        <button class="ghost">Cancel</button>
      </div>
      <div>
        <button class="sec">Import</button>
        <button class="ter">Export</button>
        <button class="ghost">Reset</button>
      </div>
    </section>

  </div>

  <!-- ── DARK ── -->
  <div class="panel dark">
    <style>
      me {
        padding: 2rem; container-type: style;
        display: flex; flex-direction: column; gap: 2.5rem;
      }
      me > h2 {
        font-size: var(--label); text-transform: uppercase;
        letter-spacing: 0.1em; opacity: 0.4;
        font-family: var(--mono); font-weight: normal;
      }
      me > section { display: flex; flex-direction: column; gap: 1rem; }
      me > section > h3 {
        font-size: var(--label); text-transform: uppercase;
        letter-spacing: 0.08em; opacity: 0.35;
        font-family: var(--mono); font-weight: normal;
      }
      me > section > div { display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; }
      me > hr { border: none; border-top: 1px solid var(--_border); opacity: 0.25; }
    </style>

    <h2>Dark mode</h2>

    <section>
      <h3>Palette buttons — .pri / .sec / .ter</h3>
      <div>
        <button class="pri">Primary</button>
        <button class="sec">Secondary</button>
        <button class="ter">Tertiary</button>
      </div>
    </section>

    <section>
      <h3>Ghost button — surface-colored</h3>
      <div>
        <button class="ghost">Ghost</button>
        <button class="ghost">Cancel</button>
      </div>
    </section>

    <hr>

    <section>
      <h3>Toggle group</h3>
      <div>
        <div class="toggle-group" data-signals:darkMode="'mono'">
          <button data-attr:aria-pressed="String($darkMode==='mono')"       data-on:pointerdown="$darkMode='mono'">Mono</button>
          <button data-attr:aria-pressed="String($darkMode==='complement')" data-on:pointerdown="$darkMode='complement'">Complement</button>
          <button data-attr:aria-pressed="String($darkMode==='triad')"      data-on:pointerdown="$darkMode='triad'">Triad</button>
        </div>
      </div>
    </section>

    <hr>

    <section>
      <h3>Mixed</h3>
      <div>
        <button class="pri">Save</button>
        <button class="ghost">Cancel</button>
      </div>
      <div>
        <button class="sec">Import</button>
        <button class="ter">Export</button>
        <button class="ghost">Reset</button>
      </div>
    </section>

  </div>

</div>

</body>
</html>
