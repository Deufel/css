# .github/workflows/deploy-docs.yaml
name: Deploy Docs

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare and commit docs
        run: |
          mkdir -p docs
          cp notebooks/__marimo__/a_css.html docs/index.html
          touch docs/.nojekyll
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "update docs"
          git push